<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海典商品标库 · 优礼汇对接 · 可点击原型预览</title>
    <style>
      :root {
        --topbar: #2e5aa6;
        --primary: #0072ff;
        --success: #00c161;
        --warning: #fe8b00;
        --danger: #fe222d;
        --bg: #f5f5f5;
        --panel: #ffffff;
        --text: #222222;
        --muted: #666666;
        --subtle: #999999;
        --border: #e7eaf0;
        --thead: #edf0f5;
        --selected: #eceef5;
        --shadow: 0 10px 28px rgba(18, 28, 45, 0.08);
        --shadow-soft: 0 6px 18px rgba(18, 28, 45, 0.08);
        --radius-card: 6px;
        --radius-module: 4px;
        --nav-w: 240px;
        --topbar-h: 60px;
        --control-h: 36px;
        --btn-h: 40px;
        --btn2-h: 36px;
        --font: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", "Source Han Sans SC", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: var(--font);
        color: var(--text);
        background: var(--bg);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .app {
        min-height: 100%;
        display: grid;
        grid-template-rows: var(--topbar-h) 1fr;
        grid-template-columns: var(--nav-w) 1fr;
        grid-template-areas:
          "top top"
          "nav main";
      }

      .topbar {
        grid-area: top;
        height: var(--topbar-h);
        background: var(--topbar);
        display: flex;
        align-items: center;
        padding: 0 16px;
        color: #fff;
        gap: 12px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 18px;
      }

      .brand-badge {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.18);
        display: grid;
        place-items: center;
        font-weight: 700;
        letter-spacing: 1px;
      }

      .topbar-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        opacity: 0.95;
      }

      .nav {
        grid-area: nav;
        background: #203c73;
        color: rgba(255, 255, 255, 0.92);
        padding: 12px 10px;
      }

      .nav-group {
        margin-top: 6px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.76);
        padding: 10px 10px 6px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 10px;
        border-radius: 10px;
        cursor: pointer;
        user-select: none;
        transition: background 0.15s ease;
      }

      .nav-item:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .nav-item.active {
        background: rgba(255, 255, 255, 0.14);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
      }

      .nav-dot {
        width: 10px;
        height: 10px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.55);
      }

      .main {
        grid-area: main;
        padding: 16px;
        overflow: hidden;
      }

      .page {
        height: calc(100vh - var(--topbar-h) - 32px);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .page-header {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .page-title {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }

      .crumbs {
        margin-left: 6px;
        font-size: 14px;
        color: var(--muted);
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid var(--border);
        color: var(--muted);
        background: #fff;
        white-space: nowrap;
      }

      .tag b {
        color: var(--text);
        font-weight: 600;
      }

      .tag.primary {
        border-color: rgba(0, 114, 255, 0.25);
        background: rgba(0, 114, 255, 0.08);
        color: #0b4db0;
      }

      .tag.success {
        border-color: rgba(0, 193, 97, 0.25);
        background: rgba(0, 193, 97, 0.1);
        color: #067a43;
      }

      .tag.warning {
        border-color: rgba(254, 139, 0, 0.25);
        background: rgba(254, 139, 0, 0.1);
        color: #9a4f00;
      }

      .tag.danger {
        border-color: rgba(254, 34, 45, 0.25);
        background: rgba(254, 34, 45, 0.08);
        color: #a0101a;
      }

      .card {
        background: var(--panel);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-soft);
        border: 1px solid var(--border);
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
      }

      .card-title {
        font-size: 18px;
        font-weight: 600;
      }

      .card-body {
        padding: 12px 14px;
      }

      .tabs {
        display: flex;
        gap: 10px;
        padding: 8px 8px;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 999px;
        box-shadow: 0 4px 10px rgba(18, 28, 45, 0.06);
      }

      .tab {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 34px;
        padding: 0 14px;
        border-radius: 999px;
        cursor: pointer;
        user-select: none;
        font-size: 14px;
        color: var(--muted);
        transition: background 0.15s ease, color 0.15s ease;
      }

      .tab:hover {
        background: rgba(0, 114, 255, 0.08);
        color: #0b4db0;
      }

      .tab.active {
        background: rgba(0, 114, 255, 0.14);
        color: #0b4db0;
        box-shadow: inset 0 0 0 1px rgba(0, 114, 255, 0.22);
      }

      .pill-count {
        min-width: 20px;
        height: 18px;
        border-radius: 999px;
        padding: 0 6px;
        display: inline-grid;
        place-items: center;
        background: rgba(0, 0, 0, 0.06);
        color: var(--muted);
        font-size: 12px;
      }

      .filters {
        display: grid;
        grid-template-columns: 180px 180px 220px 220px 1fr;
        gap: 10px;
        align-items: end;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .label {
        font-size: 14px;
        color: var(--muted);
      }

      .control {
        height: var(--control-h);
        border-radius: var(--radius-module);
        border: 1px solid var(--border);
        padding: 0 10px;
        font-size: 14px;
        background: #fff;
        outline: none;
        transition: box-shadow 0.15s ease, border-color 0.15s ease;
      }

      .control:focus {
        border-color: rgba(0, 114, 255, 0.4);
        box-shadow: 0 0 0 4px rgba(0, 114, 255, 0.12);
      }

      .btns {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }

      .btn {
        height: var(--btn-h);
        border-radius: var(--radius-module);
        border: 1px solid transparent;
        padding: 0 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        user-select: none;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        transition: transform 0.05s ease, filter 0.15s ease, box-shadow 0.15s ease;
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn.primary {
        background: var(--primary);
        color: #fff;
        box-shadow: 0 10px 18px rgba(0, 114, 255, 0.18);
      }

      .btn.secondary {
        height: var(--btn2-h);
        background: #fff;
        color: var(--text);
        border-color: var(--border);
      }

      .btn.danger {
        height: var(--btn2-h);
        background: rgba(254, 34, 45, 0.1);
        color: #a0101a;
        border-color: rgba(254, 34, 45, 0.2);
      }

      .btn.ghost {
        height: var(--btn2-h);
        background: transparent;
        color: var(--muted);
        border-color: transparent;
      }

      .btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        box-shadow: none;
      }

      .table-wrap {
        overflow: auto;
        border-radius: var(--radius-card);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      thead th {
        background: var(--thead);
        color: var(--muted);
        font-weight: 600;
        text-align: left;
        padding: 10px 10px;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }

      tbody td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--border);
        background: #fff;
        vertical-align: middle;
      }

      tbody tr:hover td {
        background: rgba(0, 114, 255, 0.04);
      }

      .row-actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .link {
        color: #0b4db0;
        cursor: pointer;
        font-weight: 600;
      }

      .link:hover {
        text-decoration: underline;
      }

      .content-scroll {
        flex: 1;
        overflow: auto;
        padding-bottom: 72px;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .group-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
        margin: 0 0 8px;
      }

      .kv {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 10px;
        padding: 10px 10px;
        border-radius: var(--radius-module);
        border: 1px solid var(--border);
        background: #fff;
      }

      .kv .k {
        color: var(--muted);
      }

      .kv .v {
        color: var(--text);
        font-weight: 600;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px 14px;
      }

      .form-item {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 10px;
        align-items: center;
      }

      .form-item .f-label {
        font-size: 14px;
        color: var(--muted);
      }

      .form-item .f-val {
        min-height: var(--control-h);
        display: flex;
        align-items: center;
        padding: 0 10px;
        border-radius: var(--radius-module);
        border: 1px solid var(--border);
        background: #fff;
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .form-item .f-val.mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-weight: 600;
      }

      .form-item.full {
        grid-column: 1 / -1;
        grid-template-columns: 120px 1fr;
        align-items: start;
      }

      .textarea-val {
        padding: 10px 10px;
        min-height: 88px;
        align-items: flex-start;
        font-weight: 500;
        color: var(--text);
      }

      .media-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 10px;
      }

      .media-tile {
        aspect-ratio: 1 / 1;
        border-radius: 10px;
        border: 1px solid var(--border);
        background:
          radial-gradient(120px 120px at 30% 25%, rgba(0, 114, 255, 0.18), transparent 60%),
          radial-gradient(120px 120px at 70% 70%, rgba(0, 193, 97, 0.14), transparent 60%),
          #ffffff;
        box-shadow: 0 8px 16px rgba(18, 28, 45, 0.06);
        display: grid;
        place-items: center;
        color: rgba(34, 34, 34, 0.75);
        cursor: pointer;
        user-select: none;
        transition: transform 0.08s ease, box-shadow 0.18s ease;
        font-weight: 700;
      }

      .media-tile:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 22px rgba(18, 28, 45, 0.1);
      }

      .file-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .file {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #fff;
      }

      .file .name {
        font-weight: 600;
      }

      .file .meta {
        font-size: 12px;
        color: var(--subtle);
      }

      .diff-table td.apply-off {
        color: var(--subtle);
      }

      .checkbox {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: #fff;
        display: inline-grid;
        place-items: center;
        cursor: pointer;
        user-select: none;
      }

      .checkbox.on {
        background: rgba(0, 114, 255, 0.14);
        border-color: rgba(0, 114, 255, 0.28);
        box-shadow: 0 0 0 4px rgba(0, 114, 255, 0.12);
      }

      .checkbox.on::after {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 3px;
        background: var(--primary);
      }

      .bottom-bar {
        position: sticky;
        bottom: 0;
        z-index: 10;
        margin-top: -62px;
        padding: 10px 0 0;
        background: linear-gradient(to bottom, rgba(245, 245, 245, 0), rgba(245, 245, 245, 0.86) 35%, rgba(245, 245, 245, 1));
      }

      .bottom-inner {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 10px 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: var(--shadow);
      }

      .bottom-left {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .bottom-right {
        margin-left: auto;
        display: flex;
        gap: 10px;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(18, 28, 45, 0.52);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        z-index: 50;
      }

      .overlay.show {
        display: flex;
      }

      .modal {
        width: min(720px, 100%);
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.28);
        overflow: hidden;
      }

      .modal-header {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .modal-title {
        font-size: 18px;
        font-weight: 600;
      }

      .modal-body {
        padding: 14px 16px;
      }

      .modal-actions {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }

      .text-area {
        width: 100%;
        min-height: 110px;
        border-radius: 10px;
        border: 1px solid var(--border);
        padding: 10px 10px;
        font-size: 14px;
        font-family: var(--font);
        outline: none;
        resize: vertical;
      }

      .text-area:focus {
        border-color: rgba(0, 114, 255, 0.4);
        box-shadow: 0 0 0 4px rgba(0, 114, 255, 0.12);
      }

      .hint {
        font-size: 14px;
        color: var(--muted);
        line-height: 1.6;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        background: rgba(34, 34, 34, 0.92);
        color: #fff;
        padding: 10px 12px;
        border-radius: 999px;
        font-size: 14px;
        display: none;
        z-index: 60;
        box-shadow: 0 12px 26px rgba(0, 0, 0, 0.22);
      }

      .toast.show {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .kbd {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        background: rgba(255, 255, 255, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        padding: 2px 6px;
        font-size: 12px;
      }

      .empty {
        padding: 28px 0;
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 1280px) {
        .filters {
          grid-template-columns: 1fr 1fr;
        }
        .media-grid {
          grid-template-columns: repeat(3, 1fr);
        }
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="brand">
          <div class="brand-badge">HD</div>
          海典商品标库 · 优礼汇对接原型
        </div>
        <div class="topbar-right">

      <div class="nav">

      </div>

      <div class="main">
        <div id="root"></div>
      </div>
    </div>

    <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-hidden="true">

    </div>
    <div class="toast" id="toast"></div>

    <script>

      const now = () => new Date().toISOString().slice(0, 19).replace("T", " ")

      const store = {

      const el = (tag, attrs = {}, children = []) => {
        const node = document.createElement(tag)
        for (const [k, v] of Object.entries(attrs)) {
          if (k === "class") node.className = v
          else if (k === "html") node.innerHTML = v
          else if (k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2).toLowerCase(), v)
          else node.setAttribute(k, v)
        }
        for (const child of Array.isArray(children) ? children : [children]) {
          if (child === null || child === undefined) continue
          node.appendChild(typeof child === "string" ? document.createTextNode(child) : child)
        }
        return node

        overlay.classList.add("show")
        overlay.setAttribute("aria-hidden", "false")

          return el("tr", {}, [

            el("td", { class: d.apply ? "" : "apply-off" }, d.oldValue || "-"),
            el("td", { class: d.apply ? "" : "apply-off" }, d.newValue || "-"),
            el("td", {}, chk),
          ])
        })

        const diffTable = el("div", { class: "card" }, [
          el("div", { class: "card-header" }, [
            el("div", { class: "card-title" }, "字段修改"),
            el("div", { style: "margin-left:auto;display:flex;gap:10px" }, [
              el(
                "button",
                {
                  class: "btn secondary",
                  onClick: () => {
                    ;(ticket.diffs || []).forEach((d) => (d.apply = true))
                    render()
                  },
                },
                "全选差异"
              ),
              el(
                "button",
                {
                  class: "btn secondary",
                  onClick: () => {
                    ;(ticket.diffs || []).forEach((d) => (d.apply = false))
                    render()
                  },
                },
                "全不选"
              ),
            ]),
          ]),
          el("div", { class: "table-wrap" }, [
            el("table", { class: "diff-table" }, [
              el("thead", {}, [
                el("tr", {}, [el("th", {}, "字段名"), el("th", {}, "平台商品信息"), el("th", {}, "修改商品信息"), el("th", {}, "是否更新")]),
              ]),
              el("tbody", {}, diffRows.length ? diffRows : el("tr", {}, [el("td", { colspan: "4" }, el("div", { class: "empty" }, "暂无差异字段"))])),
            ]),
          ]),
        ])

        const img = ticket.imageDiff || { old: [], next: [], apply: false }
        const imgApply = el("span", {
          class: `checkbox ${img.apply ? "on" : ""}`,
          onClick: () => {
            img.apply = !img.apply
            render()
          },
        })

        const imgBlock = el("div", { class: "card" }, [
          el("div", { class: "card-header" }, [el("div", { class: "card-title" }, "图片修改"), el("div", { style: "margin-left:auto;display:flex;align-items:center;gap:10px" }, [el("span", { class: "label", style: "margin:0" }, "是否更新"), imgApply])]),
          el("div", { class: "card-body" }, [
            el("div", { class: "grid-2" }, [
              el("div", {}, [
                el("div", { class: "group-title" }, "平台商品图片"),
                img.old.length
                  ? el(
                      "div",
                      { class: "media-grid" },
                      img.old.map((name) =>
                        el("div", { class: "media-tile", onClick: () => previewMedia("平台原图预览", img.old) }, name)
                      )
                    )
                  : el("div", { class: "empty" }, "无"),
              ]),
              el("div", {}, [
                el("div", { class: "group-title" }, "修改后商品图片"),
                img.next.length
                  ? el(
                      "div",
                      { class: "media-grid" },
                      img.next.map((name) =>
                        el("div", { class: "media-tile", onClick: () => previewMedia("修改后图片预览", img.next) }, name)
                      )
                    )
                  : el("div", { class: "empty" }, "无"),
              ]),
            ]),
          ]),
        ])

        const bottom = el("div", { class: "bottom-bar" }, [
          el("div", { class: "bottom-inner" }, [
            el("div", { class: "bottom-left" }, [
              platformTag(ticket.platformId),
              statusTag(ticket),
              ticket.platformCode ? tagNode("success", `平台编码：${ticket.platformCode}`) : tagNode("", "未生成平台编码"),
            ]),
            el("div", { class: "bottom-right" }, [
              el(
                "button",
                {
                  class: "btn ghost",
                  onClick: () => navTo("#/audit"),
                },
                "返回"
              ),
              el(
                "button",
                {
                  class: "btn danger",
                  disabled: ticket.status !== "PENDING" && ticket.status !== "CALLBACK_FAILED",
                  onClick: () => rejectTicket(ticket),
                },
                "审核驳回"
              ),
              el(
                "button",
                {
                  class: "btn primary",
                  disabled: ticket.status !== "PENDING" && ticket.status !== "CALLBACK_FAILED",
                  onClick: () => approveTicket(ticket),
                },
                "审核通过"
              ),
            ]),
          ]),
        ])

        const info = el("div", { class: "card" }, [
          el("div", { class: "card-header" }, [el("div", { class: "card-title" }, "单据信息")]),
          el("div", { class: "card-body" }, [
            el("div", { class: "grid-2" }, [
              el("div", { class: "kv" }, [el("div", { class: "k" }, "平台商品编码"), el("div", { class: "v mono" }, ticket.sourceGoodsCode)]),
              el("div", { class: "kv" }, [el("div", { class: "k" }, "平台编码"), el("div", { class: "v mono" }, ticket.platformCode || "-")]),
              el("div", { class: "kv" }, [el("div", { class: "k" }, "提交人"), el("div", { class: "v" }, ticket.submitter || "-")]),
              el("div", { class: "kv" }, [el("div", { class: "k" }, "提交时间"), el("div", { class: "v mono" }, ticket.createdAt || "-")]),
            ]),
          ]),
        ])

        root.replaceChildren(el("div", { class: "page" }, [header, el("div", { class: "content-scroll" }, [info, diffTable, imgBlock]), bottom]))
      }

      const parseRoute = () => {
        const h = window.location.hash || "#/audit"
        const parts = h.replace(/^#\//, "").split("/").filter(Boolean)
        if (!parts.length) return { name: "audit" }
        if (parts[0] === "audit" && parts.length === 1) return { name: "audit" }
        if (parts[0] === "audit" && parts[1] === "new" && parts[2]) return { name: "new", id: parts[2] }
        if (parts[0] === "audit" && parts[1] === "edit" && parts[2]) return { name: "edit", id: parts[2] }
        if (parts[0] === "shots") return { name: "shots" }
        return { name: "audit" }
      }

      const syncNavActive = (routeName) => {
        document.querySelectorAll(".nav-item").forEach((n) => {
          const key = n.getAttribute("data-nav")
          const active = routeName === "shots" ? key === "shots" : key === "audit"
          n.classList.toggle("active", active)
        })
      }

      const render = () => {
        const r = parseRoute()
        syncNavActive(r.name)
        if (r.name === "audit") renderList()
        else if (r.name === "new") renderNewDetail(r.id)
        else if (r.name === "edit") renderEditDetail(r.id)
        else if (r.name === "shots") renderShots()
        else renderList()
      }

      document.querySelectorAll(".nav-item").forEach((n) => {
        n.addEventListener("click", () => {
          const key = n.getAttribute("data-nav")
          navTo(key === "shots" ? "#/shots" : "#/audit")
        })
      })

      window.addEventListener("hashchange", render)
      if (!window.location.hash) navTo("#/audit")
      render()
      toast(`原型已加载：${now()}`)
    </script>
    <script>
      ;(() => {
        const show = (text) => {
          const bar = document.createElement("div")
          bar.style.position = "fixed"
          bar.style.left = "50%"
          bar.style.top = "12px"
          bar.style.transform = "translateX(-50%)"
          bar.style.background = "rgba(254, 34, 45, 0.92)"
          bar.style.color = "#fff"
          bar.style.padding = "10px 12px"
          bar.style.borderRadius = "999px"
          bar.style.fontSize = "14px"
          bar.style.zIndex = "9999"
          bar.style.boxShadow = "0 18px 40px rgba(0,0,0,0.25)"
          bar.textContent = text
          document.body.appendChild(bar)
        }

        const analyze = async () => {
          const res = await fetch(window.location.href, { cache: "no-store" })
          const html = await res.text()
          const anchor = "const PLATFORM_LABEL"
          const pos = html.indexOf(anchor)
          if (pos < 0) return
          const s = html.lastIndexOf("<script>", pos)
          const endTag = "</scr" + "ipt>"
          const e = html.indexOf(endTag, pos)
          if (s < 0 || e < 0) return
          const code = html.slice(s + "<script>".length, e)
          const findTrailing = () => {
            const idx = code.search(/,\s*\n\s*\]/)
            if (idx < 0) return null
            const before = code.slice(0, idx)
            const line = before.split("\n").length
            const ctx = code.split("\n").slice(Math.max(0, line - 3), line + 2)
            return { line, ctx: ctx.join(" | ") }
          }
          const t = findTrailing()
          if (t) {
            const msg = `检测到疑似数组尾随逗号：行≈${t.line} | ${t.ctx}`
            console.error(msg)
            show(msg)
          }
          try {
            new Function(code)
          } catch (err) {
            const detail = String(err.stack || err.message || err)
            console.error(detail)
            show(`脚本整体解析失败：${detail}`)
            return
          }
          const lines = code.split("\n")
          const tryCompile = (n) => {
            try {
              new Function(lines.slice(0, n).join("\n"))
              return null
            } catch (err) {
              return err
            }
          }

          let lo = 1
          let hi = lines.length
          let firstBad = null
          while (lo <= hi) {
            const mid = Math.floor((lo + hi) / 2)
            const err = tryCompile(mid)
            if (err) {
              firstBad = mid
              hi = mid - 1
            } else {
              lo = mid + 1
            }
          }
          if (firstBad) {
            const err = tryCompile(firstBad)
            const head = Math.max(1, firstBad - 2)
            const tail = Math.min(lines.length, firstBad + 2)
            const snippet = lines.slice(head - 1, tail).map((l, i) => `${head + i}: ${l}`).join(" | ")
            const detail = err ? String(err.stack || err.message || err) : ""
            const msg = `脚本解析失败，疑似出错行≈${firstBad}：${snippet} | ${detail}`
            console.error(msg)
            show(msg)
          }
        }

        analyze().catch(() => {})
      })()
    </script>
  </body>
</html>

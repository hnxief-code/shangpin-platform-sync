<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海典商品标库 · 优礼汇对接 · 原型预览</title>
    <style>
      :root {
        --topbar: #36445c;
        --primary: #ff7f40;
        --nav-bg: #2d384a;
        --success: #00c161;
        --warning: #fe8b00;
        --danger: #fe222d;
        --bg: #f5f5f5;
        --panel: #ffffff;
        --text: #222222;
        --muted: #666666;
        --subtle: #999999;
        --border: #e7eaf0;
        --thead: #edf0f5;
        --shadow: 0 10px 28px rgba(18, 28, 45, 0.08);
        --shadow-soft: 0 6px 18px rgba(18, 28, 45, 0.08);
        --radius-card: 6px;
        --radius-module: 4px;
        --nav-w: 64px;
        --topbar-h: 60px;
        --control-h: 36px;
        --btn-h: 40px;
        --btn2-h: 36px;
        --font: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", "Source Han Sans SC", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: var(--font);
        color: var(--text);
        background: var(--bg);
      }

      .app {
        min-height: 100%;
        display: grid;
        grid-template-rows: var(--topbar-h) 1fr;
        grid-template-columns: var(--nav-w) 1fr;
        grid-template-areas:
          "top top"
          "nav main";
      }

      .topbar {
        grid-area: top;
        height: var(--topbar-h);
        background: var(--topbar);
        display: flex;
        align-items: center;
        padding: 0 16px;
        color: #fff;
        gap: 12px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 18px;
      }

      .brand-badge {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.18);
        display: grid;
        place-items: center;
        font-weight: 700;
        letter-spacing: 1px;
      }

      .topbar-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        opacity: 0.95;
      }

      .nav {
        grid-area: nav;
        background: var(--nav-bg);
        color: rgba(255, 255, 255, 0.92);
        display: flex;
        flex-direction: column;
      }

      .nav-group {
        display: none;
      }

      .nav-items-wrapper {
        display: flex;
        flex-direction: column;
      }

      .nav-item {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 54px;
        cursor: pointer;
        user-select: none;
        transition: background 0.15s ease;
        position: relative;
        font-size: 20px;
        color: rgba(255,255,255,0.7);
      }

      .nav-item:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .nav-item.active {
        background: var(--primary);
        color: #fff;
        box-shadow: none;
      }

      .nav-item::after {
        content: "▸";
        position: absolute;
        right: 4px;
        font-size: 10px;
        color: rgba(255,255,255,0.4);
      }
      .nav-item.active::after {
        color: rgba(255,255,255,0.8);
      }

      .nav-item span.nav-text,
      .nav-dot {
        display: none;
      }

      .nav-menu-popover {
        display: none;
        position: absolute;
        left: 64px;
        top: 0;
        width: 220px;
        background: #fff;
        border-radius: 4px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        z-index: 200;
        padding: 8px 0;
        cursor: default;
        text-align: left;
        color: var(--text);
      }
      
      .nav-item:hover .nav-menu-popover {
        display: block;
      }
      
      .nav-menu-header {
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 600;
        color: var(--primary);
        background: rgba(255, 127, 64, 0.1);
        margin: -8px 0 8px 0;
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 4px 4px 0 0;
      }
      
      .nav-sub-item {
        padding: 10px 16px 10px 32px;
        font-size: 14px;
        color: var(--text);
        cursor: pointer;
        transition: background 0.15s;
      }
      
      .nav-sub-item:hover {
        background: #f5f5f5;
        color: var(--primary);
      }
      
       .nav-item:hover::before {
         display: none;
       }

      .main {
        grid-area: main;
        padding: 16px;
        overflow: hidden;
      }

      .page {
        height: calc(100vh - var(--topbar-h) - 32px);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .page-header {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .page-title {
        font-size: 20px;
        font-weight: 600;
      }

      .crumbs {
        margin-left: 6px;
        font-size: 14px;
        color: var(--muted);
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid var(--border);
        color: var(--muted);
        background: #fff;
        white-space: nowrap;
      }

      .tag.primary {
        border-color: rgba(255, 127, 64, 0.25);
        background: rgba(255, 127, 64, 0.08);
        color: #d96226;
      }

      .tag.success {
        border-color: rgba(0, 193, 97, 0.25);
        background: rgba(0, 193, 97, 0.1);
        color: #067a43;
      }

      .tag.warning {
        border-color: rgba(254, 139, 0, 0.25);
        background: rgba(254, 139, 0, 0.1);
        color: #9a4f00;
      }

      .tag.danger {
        border-color: rgba(254, 34, 45, 0.25);
        background: rgba(254, 34, 45, 0.08);
        color: #a0101a;
      }

      .card {
        background: var(--panel);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-soft);
        border: 1px solid var(--border);
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
      }

      .card-title {
        font-size: 18px;
        font-weight: 600;
      }

      .card-body {
        padding: 12px 14px;
      }

      .tabs {
        display: flex;
        gap: 10px;
        padding: 8px;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 999px;
        box-shadow: 0 4px 10px rgba(18, 28, 45, 0.06);
      }

      .tab {
        height: 34px;
        padding: 0 14px;
        border-radius: 999px;
        cursor: pointer;
        user-select: none;
        font-size: 14px;
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: background 0.15s ease, color 0.15s ease;
      }

      .tab:hover {
        background: rgba(255, 127, 64, 0.08);
        color: var(--primary);
      }

      .tab.active {
        background: rgba(255, 127, 64, 0.14);
        color: var(--primary);
        box-shadow: inset 0 0 0 1px rgba(255, 127, 64, 0.22);
      }

      .pill {
        min-width: 20px;
        height: 18px;
        border-radius: 999px;
        padding: 0 6px;
        display: inline-grid;
        place-items: center;
        background: rgba(0, 0, 0, 0.06);
        color: var(--muted);
        font-size: 12px;
      }

      .filters {
        display: grid;
        grid-template-columns: 180px 180px 260px 1fr;
        gap: 10px;
        align-items: end;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .label {
        font-size: 14px;
        color: var(--muted);
      }

      .control {
        height: var(--control-h);
        border-radius: var(--radius-module);
        border: 1px solid var(--border);
        padding: 0 10px;
        font-size: 14px;
        background: #fff;
        outline: none;
      }

      .btns {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }

      .btn {
        border-radius: var(--radius-module);
        border: 1px solid transparent;
        padding: 0 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        user-select: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .btn.primary {
        height: var(--btn-h);
        background: var(--primary);
        color: #fff;
        box-shadow: 0 10px 18px rgba(255, 127, 64, 0.18);
      }

      .btn.secondary {
        height: var(--btn2-h);
        background: #fff;
        color: var(--text);
        border-color: var(--border);
      }

      .btn.danger {
        height: var(--btn2-h);
        background: rgba(254, 34, 45, 0.1);
        color: #a0101a;
        border-color: rgba(254, 34, 45, 0.2);
      }

      .btn.ghost {
        height: var(--btn2-h);
        background: transparent;
        color: var(--muted);
        border-color: transparent;
      }

      .btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        box-shadow: none;
      }

      .table-wrap {
        overflow: auto;
        border-radius: var(--radius-card);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      thead th {
        background: var(--thead);
        color: var(--muted);
        font-weight: 600;
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }

      tbody td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--border);
        background: #fff;
        vertical-align: middle;
      }

      tbody tr:hover td {
        background: rgba(255, 127, 64, 0.04);
      }

      .link {
        color: var(--primary);
        cursor: pointer;
        font-weight: 600;
      }

      .link:hover {
        text-decoration: underline;
      }

      .content-scroll {
        flex: 1;
        overflow: auto;
        padding-bottom: 72px;
      }

      .kv-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .kv {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 10px;
        padding: 10px;
        border-radius: var(--radius-module);
        border: 1px solid var(--border);
        background: #fff;
      }

      .kv .k {
        color: var(--muted);
      }

      .kv .v {
        color: var(--text);
        font-weight: 600;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px 14px;
      }

      .form-item {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 10px;
        align-items: center;
      }

      .form-item .f-label {
        font-size: 14px;
        color: var(--muted);
      }

      .form-item .f-val {
        min-height: var(--control-h);
        display: flex;
        align-items: center;
        padding: 0 10px;
        border-radius: var(--radius-module);
        border: 1px solid var(--border);
        background: #fff;
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .form-item.full {
        grid-column: 1 / -1;
        align-items: start;
      }

      .textarea-val {
        padding: 10px;
        min-height: 88px;
        align-items: flex-start;
        font-weight: 500;
      }

      .media-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 10px;
      }

      .media-tile {
        aspect-ratio: 1 / 1;
        border-radius: 10px;
        border: 1px solid var(--border);
        background:
          radial-gradient(120px 120px at 30% 25%, rgba(255, 127, 64, 0.12), transparent 60%),
          radial-gradient(120px 120px at 70% 70%, rgba(0, 193, 97, 0.08), transparent 60%),
          #ffffff;
        box-shadow: 0 8px 16px rgba(18, 28, 45, 0.06);
        display: grid;
        place-items: center;
        color: rgba(34, 34, 34, 0.75);
        cursor: pointer;
        user-select: none;
        font-weight: 700;
      }

      .bottom-bar {
        position: sticky;
        bottom: 0;
        z-index: 10;
        margin-top: -62px;
        padding-top: 10px;
        background: linear-gradient(to bottom, rgba(245, 245, 245, 0), rgba(245, 245, 245, 0.86) 35%, rgba(245, 245, 245, 1));
      }

      .bottom-inner {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 10px 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: var(--shadow);
      }

      .bottom-right {
        margin-left: auto;
        display: flex;
        gap: 10px;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(18, 28, 45, 0.52);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        z-index: 50;
      }

      .overlay.show {
        display: flex;
      }

      .modal {
        width: min(720px, 100%);
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.28);
        overflow: hidden;
      }

      .modal-header {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .modal-title {
        font-size: 18px;
        font-weight: 600;
      }

      .modal-body {
        padding: 14px 16px;
      }

      .modal-actions {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }

      .text-area {
        width: 100%;
        min-height: 110px;
        border-radius: 10px;
        border: 1px solid var(--border);
        padding: 10px;
        font-size: 14px;
        font-family: var(--font);
        outline: none;
        resize: vertical;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        background: rgba(34, 34, 34, 0.92);
        color: #fff;
        padding: 10px 12px;
        border-radius: 999px;
        font-size: 14px;
        display: none;
        z-index: 60;
        box-shadow: 0 12px 26px rgba(0, 0, 0, 0.22);
      }

      .toast.show {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      @media (max-width: 1280px) {
        .filters {
          grid-template-columns: 1fr 1fr;
        }
        .media-grid {
          grid-template-columns: repeat(3, 1fr);
        }
        .form-grid {
          grid-template-columns: 1fr;
        }
        .kv-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script>
      window.addEventListener("error", (e) => {
        const info = `${e.message || "Script error"} @ ${e.filename || ""}:${e.lineno || ""}:${e.colno || ""}`
        const bar = document.createElement("div")
        bar.style.position = "fixed"
        bar.style.left = "50%"
        bar.style.top = "12px"
        bar.style.transform = "translateX(-50%)"
        bar.style.background = "rgba(254, 34, 45, 0.92)"
        bar.style.color = "#fff"
        bar.style.padding = "10px 12px"
        bar.style.borderRadius = "999px"
        bar.style.fontSize = "14px"
        bar.style.zIndex = "99999"
        bar.style.boxShadow = "0 18px 40px rgba(0,0,0,0.25)"
        bar.textContent = info
        document.body.appendChild(bar)
      })
    </script>
  </head>

        for (const t of sorted) {
          if (t.type === "NEW") {
            const key = `${t.platformId}|${t.sourceGoodsCode || (t.fields && t.fields.productCode) || t.goodsName || t.id}`
            const arr = newGroups.get(key) || []
            arr.push(t)
            newGroups.set(key, arr)
          } else {
            const key = `${t.platformId}|${t.platformCode || t.sourceGoodsCode || t.goodsName || t.id}`
            const arr = editGroups.get(key) || []
            arr.push(t)
            editGroups.set(key, arr)
          }
        }

        const pickNew = (arr) => {
          const done = arr.find((x) => x.status === "DONE")
          if (done) return done
          return arr[0]
        }

        const picked = []
        for (const arr of newGroups.values()) {
          picked.push(pickNew(arr))
        }

        const keepEdit = (arr) => {
          const dones = arr.filter((x) => x.status === "DONE")
          const others = arr.filter((x) => x.status !== "DONE")
          const latestOther = others.length ? others[0] : null
          return [...dones, ...(latestOther ? [latestOther] : [])]
        }
        for (const arr of editGroups.values()) {
          picked.push(...keepEdit(arr))
        }

      const parseRoute = () => {
        const h = window.location.hash || "#/audit-list"
        const cleaned = h.startsWith("#/") ? h.slice(2) : h.startsWith("#") ? h.slice(1) : h
        const p = cleaned.split("/").filter(Boolean)
        if (!p.length) return { name: "audit-list" }
        if (p[0] === "audit-list") return { name: "audit-list" }
        if (p[0] === "audit" && p[1] === "new" && p[2]) return { name: "new", id: p[2] }
        if (p[0] === "audit" && p[1] === "edit" && p[2]) return { name: "edit", id: p[2] }
        if (p[0] === "shots") return { name: "shots" }
        return { name: "audit-list" }
      }

      const syncNav = (name) => {
        document.querySelectorAll(".nav-item").forEach((n) => {
          const key = n.getAttribute("data-nav")
          let active = false;
          if (name === "audit-list" || name === "new" || name === "edit") active = (key === "audit-list")
          else if (name === "shots") active = (key === "shots")
          n.classList.toggle("active", active)
        })
      }

      const render = () => {
        const r = parseRoute()
        syncNav(r.name)
        if (r.name === "audit-list") renderAuditList()
        else if (r.name === "new") renderNew(r.id)
        else if (r.name === "edit") renderEdit(r.id)
        else if (r.name === "shots") renderShots()
        else renderAuditList()
      }

      document.querySelectorAll(".nav-item").forEach((n) => {
        n.addEventListener("click", () => {
          const key = n.getAttribute("data-nav")
          navTo("#/" + key)
        })
      })

      document.addEventListener("click", (e) => {
        const el = e.target.closest ? e.target.closest('[data-act]') : null
        if (!el) return
        const act = el.getAttribute("data-act")
        if (!act) return
        if (act === "close") closeModal()
        else if (act === "back") {
          const r = parseRoute()
          if (r.name === "new") navTo("#/audit-list")
          else if (r.name === "edit") navTo("#/audit-list")
          else navTo("#/audit-list")
        }
        else if (act === "open") {
          const id = el.getAttribute("data-id")
          const t = getTicket(id)
          if (!t) return
          navTo(t.type === "NEW" ? `#/audit/new/${t.id}` : `#/audit/edit/${t.id}`)
        } else if (act === "approve") {
          const id = el.getAttribute("data-id")
          approve(id)
        } else if (act === "reject") {
          const id = el.getAttribute("data-id")
          reject(id)
        } else if (act === "confirm-approve") {
          const id = el.getAttribute("data-id")
          const t = getTicket(id)
          if (!t) return
          closeModal()
          applyApprove(t)
        } else if (act === "confirm-reject") {
          const id = el.getAttribute("data-id")
          const t = getTicket(id)
          if (!t) return
          const v = ($("#rejectReason") && $("#rejectReason").value ? $("#rejectReason").value.trim() : "")
          if (!v) {
            toast("请填写驳回原因")
            return
          }
          t.status = "REJECTED"
          t.rejectReason = v
          closeModal()
          toast("已驳回并记录原因")
          navTo("#/audit-list")
          render()
        } else if (act === "retry") {
          const id = el.getAttribute("data-id")
          retryCallback(id)
        } else if (act === "reset") {
          state.ui.status = ""
          state.ui.keyword = ""
          render()
        } else if (act === "search") {
          const s = $("#filterStatus")
          const k = $("#filterKeyword")
          state.ui.status = s ? s.value : ""
          state.ui.keyword = k ? k.value : ""
          render()
        } else if (act === "preview-media") {
          const title = el.getAttribute("data-title")
          const items = JSON.parse(decodeURIComponent(el.getAttribute("data-items") || "[]"))
          const idx = Number(el.getAttribute("data-idx") || "0")
          previewMedia(title, items, idx)
        } else if (act === "prev-media" || act === "next-media") {
          const title = decodeURIComponent(el.getAttribute("data-title") || "")
          const items = JSON.parse(decodeURIComponent(el.getAttribute("data-items") || "[]"))
          const idx = Number(el.getAttribute("data-idx") || "0")
          const next = act === "prev-media" ? idx - 1 : idx + 1
          previewMedia(title, items, next)
        } else if (act === "download") {
          toast("原型演示：此处触发下载")
        }
      })

      document.addEventListener("change", (e) => {
        const el = e.target
        if (!el) return
        const act = el.getAttribute("data-act")
        if (act === "toggle-diff") {
          const id = el.getAttribute("data-id")
          const idx = Number(el.getAttribute("data-idx") || "0")
          const t = getTicket(id)
          if (!t || !t.diffs) return
          t.diffs[idx].apply = !!el.checked
          render()
        } else if (act === "toggle-img") {
          const id = el.getAttribute("data-id")
          const t = getTicket(id)
          if (!t || !t.imageDiff) return
          t.imageDiff.apply = !!el.checked
          render()
        } else if (act === "toggle-winimg") {
          const id = el.getAttribute("data-id")
          const t = getTicket(id)
          if (!t || !t.windowImageDiff) return
          t.windowImageDiff.apply = !!el.checked
          render()
        }
      })

      window.addEventListener("hashchange", render)
      if (!window.location.hash) navTo("#/audit-list")
      render()
      toast("原型已加载")
    </script>
  </body>
</html>
